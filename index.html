const OP_ZH={ADD_LANE_CONNECTION:'新增车道连接',REMAP_LANE_CONNECTION:'重映射车道连接',NO_OP:'无需修改',REJECT_UNSUPPORTED_UTURN:'拒绝无依据掉头',PRESERVE_SIGNAL_CONTROL:'保留信号控制',DEFER_FOR_CLARIFICATION:'暂缓并要求澄清',SUPPRESS_CONNECTION_CANDIDATE:'抑制连接候选'};
const DECISION_ZH={materialize:'执行修改',defer:'暂缓处理',no_op:'不执行修改'};
const DIR_ZH={l:'左转',r:'右转',s:'直行',t:'掉头','?':'方向不明确'};
const OPTION_ZH={yes:'是',no:'否',ambiguous:'存在歧义',uncertain:'不确定',not_applicable:'不适用',partially:'部分符合','1':'1（很不自然）','2':'2','3':'3（基本可读）','4':'4','5':'5（非常自然）'};
function yn(v){return BOOL_ZH[String(Boolean(v))]}
function candidateHTML(c){return `<div class="candidate"><b>候选编号：${esc(c.candidate_id)}</b><br><b>连接：</b>${esc(c.from_edge)}【${esc(c.from_lane)}号车道】→ ${esc(c.to_edge)}【${esc(c.to_lane)}号车道】<br><b>转向：</b>${esc(DIR_ZH[c.dir]||c.dir)}　<b>同一交叉口：</b>${yn(c.same_junction)}　<b>几何支持：</b>${yn(c.geometry_grounded)}<br><b>连接已存在：</b>${yn(c.already_present)}　<b>属于掉头：</b>${yn(c.is_uturn)}　<b>受保护上下文：</b>${yn(c.protected_context)}　<b>车道可用：</b>${yn(c.lane_available)}</div>`;}
function select(name,options){return `<select data-field="${name}"><option value="">请选择</option>${options.map(x=>`<option value="${x}">${OPTION_ZH[x]||x}</option>`).join('')}</select>`;}
function planHTML(r){const p=r.system_output.parsed_plan||{};return `<p><b>处理决定：</b>${esc(DECISION_ZH[p.decision]||p.decision||'未提供')}</p><p><b>操作类型：</b>${esc(OP_ZH[p.registered_operation]||p.registered_operation||'未提供')}</p><p><b>目标候选：</b>${esc((p.target_candidate_ids||[]).join('、')||'无')}</p><p><b>依据规则：</b>${esc((p.selected_rule_ids||[]).join('、')||'未引用特定规则')}</p><p><b>置信度：</b>${esc(p.confidence??'未提供')}</p><p><b>系统理由：</b>${esc(r.reason_zh)}</p><p><b>契约结构与类型检查：</b>${r.system_output.contract_valid?'通过':'未通过'}</p>`;}
function render(){document.getElementById('cases').innerHTML=DATA.map(r=>`<section class="case" data-id="${r.audit_case_id}"><h2>${r.audit_case_id}</h2><div class="meta">数据来源：${esc(r.source_family_zh)}　|　指令类型：${esc(r.language_style_zh)}　|　模型：${esc(r.model)}</div><div class="grid"><div class="panel"><h3>公开指令</h3><p>${esc(r.instruction_zh)}</p><h3>公开候选连接</h3>${r.candidates.map(candidateHTML).join('')}</div><div class="panel"><h3>检索到的规则卡</h3>${r.selected_rule_cards.map(x=>`<p><b>${esc(x.rule_id)}　${esc(x.name_zh)}</b><br>${esc(x.natural_language_rule_zh)}</p>`).join('')||'<p>未检索到规则卡</p>'}<h3>系统输出</h3>${planHTML(r)}</div></div><label>1. 这条指令作为交通拓扑修改要求是否自然、易懂？</label>${select('naturalness',['1','2','3','4','5'])}<label>2. 仅凭页面公开信息，能否形成明确判断？</label>${select('identifiable',['yes','no','ambiguous'])}<label>3. 系统选择的操作类型是否合理？</label>${select('operation_reasonable',['yes','no','uncertain'])}<label>4. 系统选择的候选连接是否合理？</label>${select('candidate_reasonable',['yes','no','not_applicable','uncertain'])}<label>5. 检索到的规则卡是否与当前处理相关？</label>${select('rule_relevant',['yes','no','partially','not_applicable'])}<label>6. 页面是否疑似泄漏隐藏答案？</label>${select('leakage_suspected',['no','yes','uncertain'])}<label>7. 系统理由是否足以支持其最终决定？</label>${select('explanation_supported',['yes','no','partially'])}<label>补充意见（可选）</label><textarea data-field="comment" placeholder="请记录你认为不合理、含糊或需要补充的地方"></textarea></section>`).join('');loadSaved();updateProgress();}
function collect(){return DATA.map(r=>{const e=document.querySelector(`[data-id="${r.audit_case_id}"]`);const a={audit_case_id:r.audit_case_id};FIELDS.forEach(f=>a[f]=e.querySelector(`[data-field="${f}"]`).value);return a;});}
function saveAll(){if(!document.getElementById('annotator').value.trim()){alert('请填写标注者ID');return}localStorage.setItem(key(),JSON.stringify(collect()));updateProgress();}
function loadSaved(){const raw=localStorage.getItem(key());if(!raw)return;JSON.parse(raw).forEach(a=>{const e=document.querySelector(`[data-id="${a.audit_case_id}"]`);if(e)FIELDS.forEach(f=>{const n=e.querySelector(`[data-field="${f}"]`);if(n)n.value=a[f]||'';});});}
function packageData(){return {schema_version:'p1-human-annotations-v1',annotator_id:document.getElementById('annotator').value.trim(),exported_at:new Date().toISOString(),annotations:collect()};}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href);}
function exportJSON(){saveAll();const p=packageData();if(!p.annotator_id)return;download(`p1_audit_${p.annotator_id}.json`,JSON.stringify(p,null,2),'application/json');}
function exportCSV(){saveAll();const p=packageData();if(!p.annotator_id)return;const rows=[['annotator_id','audit_case_id',...FIELDS],...p.annotations.map(a=>[p.annotator_id,a.audit_case_id,...FIELDS.map(f=>a[f])])];download(`p1_audit_${p.annotator_id}.csv`,rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(',')).join('\n'),'text/csv');}
function updateProgress(){const a=collect();document.getElementById('progress').textContent=`已完成 ${a.filter(x=>x.naturalness&&x.identifiable&&x.operation_reasonable&&x.candidate_reasonable&&x.rule_relevant&&x.leakage_suspected&&x.explanation_supported).length} / ${a.length}`;}
document.addEventListener('change',()=>{saveAll();});document.getElementById('annotator').addEventListener('change',render);render();
</script></body></html>
